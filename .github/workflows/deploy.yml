name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build Application
        run: npm run build
        env:
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dazzlingscreens.com
          username: omprakash
          key: ${{ secrets.VPS_DAZZ_SSH_KEY }}
          port: 35439
          script: |
            cd /home/omprakash
            ./deploy.sh 2>&1 | tee -a deploy.log
